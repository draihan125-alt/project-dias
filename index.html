<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>RAMC Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>
* {
  font-family: 'Poppins', sans-serif;
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #f4f6f9;
}

/* HEADER */
.topbar {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  padding: 20px;
  margin: 20px;
  border-radius: 12px;
}

/* TOOLBAR */
.toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 0 20px 10px;
}

/* BUTTON */
.btn-add {
  padding: 10px 20px;
  background: #27ae60;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.btn-add:hover {
  background: #219150;
}

/* TABLE */
.table-card {
  background: white;
  margin: 20px;
  border-radius: 10px;
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #f5f5f5;
  padding: 12px;
}

td {
  padding: 10px;
  border-bottom: 1px solid #eee;
}

tr:hover {
  background: #fafafa;
}

/* BADGE */
.badge-ok {
  background: #d4edda;
  padding: 5px 10px;
  border-radius: 20px;
}

.badge-ng {
  background: #f8d7da;
  padding: 5px 10px;
  border-radius: 20px;
}

/* MODAL */
.hidden {
  display: none !important;
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: flex;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 350px;
}

input, select {
  width: 100%;
  margin: 5px 0;
  padding: 8px;
}

button {
  margin-top: 5px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
  <h2>📋 RAMC Dashboard</h2>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <h3>Equipment Data</h3>
  <button class="btn-add" onclick="openModal()">+ Add Data</button>
</div>

<!-- TABLE -->
<div class="table-card">
<table>
<thead>
<tr>
<th>Equipment</th>
<th>Asset</th>
<th>Location</th>
<th>Condition</th>
<th>Calibration</th>
<th>Date In</th>
<th>Date Out</th>
<th>Status</th>
</tr>
</thead>
<tbody id="table-body"></tbody>
</table>
</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3>Tambah Data</h3>

    <input id="fEquipment" placeholder="Equipment">
    <input id="fAsset" placeholder="Asset">
    <input id="fLocation" placeholder="Location">
    <input id="fCondition" placeholder="Condition">
    <input id="fCalibration" placeholder="Calibration">
    <input id="fDateIn" type="date">
    <input id="fDateOut" type="date">

    <select id="fStatus">
      <option value="OK">OK</option>
      <option value="NG">NG</option>
    </select>

    <button onclick="saveData()">Save</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const API_URL = "https://project-dias.onrender.com/equipments";
let data = [];

/* FETCH */
async function fetchData() {
  const res = await fetch(API_URL);
  const result = await res.json();
  data = result;
  renderTable();
}

/* RENDER */
function renderTable() {
  const tbody = document.getElementById("table-body");
  tbody.innerHTML = "";

  data.forEach(item => {
    const status = item.status?.toUpperCase();
    const badge = status === "OK" ? "badge-ok" : "badge-ng";

    tbody.innerHTML += `
    <tr>
      <td>${item.equipment}</td>
      <td>${item.asset}</td>
      <td>${item.location}</td>
      <td>${item.condition}</td>
      <td>${item.calibration}</td>
      <td>${item.date_in?.split('T')[0] || '-'}</td>
      <td>${item.date_out?.split('T')[0] || '-'}</td>
      <td><span class="${badge}">${status}</span></td>
    </tr>`;
  });
}

/* SAVE */
async function saveData() {
  const newData = {
    equipment: fEquipment.value,
    asset: fAsset.value,
    location: fLocation.value,
    condition: fCondition.value,
    calibration: fCalibration.value,
    date_in: fDateIn.value,
    date_out: fDateOut.value,
    status: fStatus.value
  };

  await fetch(API_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(newData)
  });

  alert("✅ Data saved");
  closeModal();
  fetchData();
}

/* MODAL */
function openModal() {
  document.getElementById("modal").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
}

/* klik luar close */
window.onclick = function(e) {
  if (e.target.id === "modal") closeModal();
};

/* AUTO UPDATE MULTI USER 🔥 */
setInterval(fetchData, 3000);

/* LOAD */
fetchData();
</script>

</body>
</html>
