<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Improvement Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f4f6f9;
}

.topbar {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  padding: 20px;
  margin: 20px;
  border-radius: 12px;
}

.table-card {
  background: white;
  margin: 20px;
  border-radius: 10px;
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
}

th {
  background: #f5f5f5;
}

.modal-content {
  background: white;
  padding: 20px;
  margin: 20px;
  border-radius: 10px;
  width: 300px;
}

input, select {
  width: 100%;
  margin: 5px 0;
  padding: 8px;
}

.badge-ok {
  background: #d4edda;
  padding: 5px 10px;
}

.badge-ng {
  background: #f8d7da;
  padding: 5px 10px;
}
</style>
</head>

<body>

<div class="topbar">
  <h2>📋 Improvement Dashboard</h2>
</div>

<div class="table-card">
<table>
<thead>
<tr>
<th>Equipment</th>
<th>Asset</th>
<th>Location</th>
<th>Condition</th>
<th>Calibration</th>
<th>Date In</th>
<th>Date Out</th>
<th>Status</th>
</tr>
</thead>
<tbody id="table-body"></tbody>
</table>
</div>

<div class="modal-content">
<h3>Tambah Data</h3>

<input id="fEquipment" placeholder="Equipment">
<input id="fAsset" placeholder="Asset">
<input id="fLocation" placeholder="Location">
<input id="fCondition" placeholder="Condition">
<input id="fCalibration" placeholder="Calibration">

<input id="fDateIn" type="date">
<input id="fDateOut" type="date">

<select id="fStatus">
<option value="OK">OK</option>
<option value="NG">NG</option>
</select>

<button onclick="saveData()">Save</button>
</div>

<script>
const API_URL = "https://project-dias.onrender.com/equipments";
let data = [];

async function fetchData() {
  const res = await fetch(API_URL);
  const result = await res.json();
  data = result;
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById("table-body");
  tbody.innerHTML = "";

  data.forEach(item => {
    const status = item.status?.toUpperCase();

    const badge = status === "OK" ? "badge-ok" : "badge-ng";

    const row = `
    <tr>
      <td>${item.equipment}</td>
      <td>${item.asset}</td>
      <td>${item.location}</td>
      <td>${item.condition}</td>
      <td>${item.calibration}</td>
      <td>${item.date_in?.split('T')[0] || '-'}</td>
      <td>${item.date_out?.split('T')[0] || '-'}</td>
      <td><span class="${badge}">${status}</span></td>
    </tr>
    `;

    tbody.innerHTML += row;
  });
}

async function saveData() {
  const newData = {
    equipment: fEquipment.value,
    asset: fAsset.value,
    location: fLocation.value,
    condition: fCondition.value,
    calibration: fCalibration.value,
    date_in: fDateIn.value,
    date_out: fDateOut.value,
    status: fStatus.value
  };

  await fetch(API_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(newData)
  });

  alert("✅ saved");
  fetchData();
}

fetchData();
</script>

</body>
</html>
