<!DOCTYPE html>
<html>
<head>
  <title>RAMC Dashboard</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }

    th {
      background-color: #f5f5f5;
    }

    tr:hover {
      background-color: #f1f1f1;
    }

    button {
      padding: 5px 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>RAMC Dashboard</h2>

<!-- FILTER -->
<select id="filterLocation">
  <option value="">All Location</option>
  <option value="Lab">Lab</option>
  <option value="Lab 1">Lab 1</option>
  <option value="Lab 2">Lab 2</option>
  <option value="Chamber">Chamber</option>
</select>

<!-- FORM ADD -->
<h3>Add Data</h3>
<input id="equipment" placeholder="Equipment">
<input id="asset" placeholder="Asset">
<input id="location" placeholder="Location">
<button onclick="addData()">Add</button>

<br><br>

<table>
  <thead>
    <tr>
      <th>Equipment</th>
      <th>Asset</th>
      <th>Location</th>
      <th>Date In</th>
      <th>Date Out</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
const API = "https://project-dias.onrender.com/equipment";
let allData = [];

function fetchData() {
  fetch(API)
    .then(res => res.json())
    .then(data => {
      allData = data;
      renderTable(data);
    });
}

function renderTable(data) {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  data.forEach(item => {
    tbody.innerHTML += `
      <tr>
        <td>${item.equipment}</td>
        <td>${item.asset}</td>
        <td>${item.location}</td>
        <td>${item.date_in}</td>
        <td>${item.date_out || '-'}</td>
        <td>
          ${item.status === 'Available'
            ? `<button onclick="borrow(${item.id})">Borrow</button>`
            : item.status
          }
        </td>
      </tr>
    `;
  });
}

function addData() {
  const equipment = document.getElementById("equipment").value;
  const asset = document.getElementById("asset").value;
  const location = document.getElementById("location").value;

  const today = new Date().toISOString().split('T')[0];

  fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      equipment,
      asset,
      location,
      date_in: today,
      status: "Available"
    })
  })
  .then(res => res.json())
  .then(() => {
    fetchData();
  });
}

function borrow(id) {
  const today = new Date().toISOString().split('T')[0];

  fetch(`${API}/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      date_out: today,
      status: "Used"
    })
  })
  .then(() => fetchData());
}

// FILTER LOCATION
document.getElementById("filterLocation")
.addEventListener("change", function() {
  const val = this.value;
  if (!val) return renderTable(allData);

  const filtered = allData.filter(d => d.location === val);
  renderTable(filtered);
});

fetchData();
</script>

</body>
</html>
