<!DOCTYPE html>
<html>
<head>
  <title>RAMC Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
    }

    .container {
      padding: 20px;
    }

    .header {
      background: linear-gradient(90deg, #6a5acd, #7b68ee);
      color: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .form {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .form input, .form select {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .form button {
      background: #28a745;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
    }

    .form button:hover {
      background: #218838;
    }

    .cards {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .card {
      flex: 1;
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      font-weight: bold;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: #f0f0f0;
      padding: 12px;
      text-align: left;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    .status-in {
      color: green;
      font-weight: bold;
    }

    .status-out {
      color: red;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">📋 RAMC Dashboard</div>

  <div class="form">
    <input type="text" id="equipment" placeholder="Equipment">
    <input type="text" id="asset" placeholder="Asset">

    <select id="location">
      <option value="CHAMBER">CHAMBER</option>
      <option value="AGING">AGING</option>
      <option value="LIFE TEST">LIFE TEST</option>
      <option value="MQA">MQA</option>
    </select>

    <button onclick="addData()">+ Add</button>

    <select id="locationFilter">
      <option value="CHAMBER">CHAMBER</option>
      <option value="AGING">AGING</option>
      <option value="LIFE TEST">LIFE TEST</option>
      <option value="MQA">MQA</option>
    </select>
  </div>

  <div class="cards">
    <div class="card">CHAMBER: <span id="c1">0</span></div>
    <div class="card">AGING: <span id="c2">0</span></div>
    <div class="card">LIFE TEST: <span id="c3">0</span></div>
    <div class="card">MQA: <span id="c4">0</span></div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Equipment</th>
        <th>Asset</th>
        <th>Location</th>
        <th>Date In</th>
        <th>Date Out</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script>
const API = "https://your-backend.onrender.com/api/equipment"; // 🔥 GANTI INI

async function loadData() {
  const filter = document.getElementById("locationFilter").value;

  const res = await fetch(API);
  const data = await res.json();

  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  let c1=0, c2=0, c3=0, c4=0;

  data.forEach(item => {
    if(!item.date_out){
      if(item.location==="CHAMBER") c1++;
      if(item.location==="AGING") c2++;
      if(item.location==="LIFE TEST") c3++;
      if(item.location==="MQA") c4++;
    }
  });

  document.getElementById("c1").innerText = c1;
  document.getElementById("c2").innerText = c2;
  document.getElementById("c3").innerText = c3;
  document.getElementById("c4").innerText = c4;

  data
    .filter(item => item.location === filter)
    .forEach(item => {
      const row = `
        <tr>
          <td>${item.equipment}</td>
          <td>${item.asset}</td>
          <td>${item.location}</td>
          <td>${item.date_in || '-'}</td>
          <td>${item.date_out || '-'}</td>
          <td class="${item.date_out ? 'status-out' : 'status-in'}">
            ${item.date_out ? 'RETURNED' : 'IN USE'}
          </td>
        </tr>
      `;
      tbody.innerHTML += row;
    });
}

async function addData() {
  const equipment = document.getElementById("equipment").value;
  const asset = document.getElementById("asset").value;
  const location = document.getElementById("location").value;

  await fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ equipment, asset, location })
  });

  document.getElementById("equipment").value = "";
  document.getElementById("asset").value = "";

  loadData(); // auto refresh
}

document.getElementById("locationFilter")
  .addEventListener("change", loadData);

window.onload = loadData;
</script>

</body>
</html>
