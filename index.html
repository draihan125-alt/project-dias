<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RAMC Equipment Dashboard</title>

<link href="https://fontscom/css2?family=Poppins:wght@300;400;500;600;700&display=swap

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fc;
}

.topbar{
    margin:20px;
    padding:25px 35px;
    border-radius:20px;
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.topbar h1{
    font-size:28px;
}

.btn-add{
    background:#22c55e;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.btn-add:hover{
    background:#16a34a;
}

.kpi{
    margin:20px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

.card{
    background:white;
    padding:20px;
    border-radius:16px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h3{
    margin-bottom:10px;
}

.card span{
    font-size:36px;
    font-weight:bold;
    color:#4f46e5;
}

.form-card{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:16px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.form-grid input,
.form-grid select{
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
}

.form-grid button{
    background:#4f46e5;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.toolbar{
    margin:20px;
    display:flex;
    justify-content:space-between;
}

.search-box input{
    width:350px;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
}

.table-card{
    margin:20px;
    background:white;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:linear-gradient(135deg,#6366f1,#8b5cf6);
    color:white;
    text-align:left;
    padding:15px;
}

td{
    padding:14px;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#f8fafc;
}

.badge{
    padding:8px 14px;
    border-radius:20px;
    font-size:12px;
    font-weight:600;
}

.badge-ok{
    background:#dcfce7;
    color:#166534;
}

.badge-ng{
    background:#fee2e2;
    color:#991b1b;
}

@media(max-width:900px){

.kpi{
    grid-template-columns:repeat(2,1fr);
}

.form-grid{
    grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="topbar">

    <div>
        <h1>📊 RAMC Equipment Dashboard</h1>
        <p>DQA Equipment Monitoring System</p>
    </div>

</div>

<div class="kpi">

    <div class="card">
        <h3>🧪 CHAMBER</h3>
        <span id="chamberCount">0</span>
    </div>

    <div class="card">
        <h3>🔥 AGING</h3>
        <span id="agingCount">0</span>
    </div>

    <div class="card">
        <h3>⚡ LIFE TEST</h3>
        <span id="lifeCount">0</span>
    </div>

    <div class="card">
        <h3>✅ MQA</h3>
        <span id="mqaCount">0</span>
    </div>

</div>

<div class="form-card">

<h3 style="margin-bottom:15px;">Add Equipment</h3>

<div class="form-grid">

<input id="fEquipment" placeholder="Equipment">

<input id="fAsset" placeholder="Asset">

<input id="fLocation" placeholder="Location">

<input id="fCondition" placeholder="Condition">

<input id="fCalibration" placeholder="Calibration">

<input type="date" id="fDateIn">

<input type="date" id="fDateOut">

<select id="fStatus">
<option value="OK">OK</option>
<option value="NG">NG</option>
</select>

<button onclick="saveData()">Save Data</button>

</div>

</div>

<div class="toolbar">

<div class="search-box">
<input
id="searchInput"
placeholder="🔍 Search Equipment..."
onkeyup="renderTable()">
</div>

<div>
Total Data :
<b id="totalData">0</b>
</div>

</div>

<div class="table-card">

<table>

<thead>
<tr>
<th>Equipment</th>
<th>Asset</th>
<th>Location</th>
<th>Condition</th>
<th>Calibration</th>
<th>Date In</th>
<th>Date Out</th>
<th>Status</th>
</tr>
</thead>

<tbody id="table-body">
</tbody>

</table>

</div>

<script>

const API_URL =
"https://project-dias.onrender.com/equipments";

let data = [];

async function fetchData(){

    try{

        const res = await fetch(API_URL);
        data = await res.json();

        renderTable();

    }catch(err){

        console.error(err);

    }

}

function renderTable(){

    const tbody =
    document.getElementById("table-body");

    tbody.innerHTML="";

    const keyword =
    document.getElementById("searchInput")
    .value
    .toLowerCase();

    const filtered =
    data.filter(item =>
        JSON.stringify(item)
        .toLowerCase()
        .includes(keyword)
    );

    document.getElementById("totalData")
    .innerText = filtered.length;

    document.getElementById("chamberCount")
    .innerText =
    data.filter(x =>
    (x.location||"")
    .toUpperCase()
    .includes("CHAMBER")).length;

    document.getElementById("agingCount")
    .innerText =
    data.filter(x =>
    (x.location||"")
    .toUpperCase()
    .includes("AGING")).length;

    document.getElementById("lifeCount")
    .innerText =
    data.filter(x =>
    (x.location||"")
    .toUpperCase()
    .includes("LIFE")).length;

    document.getElementById("mqaCount")
    .innerText =
    data.filter(x =>
    (x.location||"")
    .toUpperCase()
    .includes("MQA")).length;

    filtered.forEach(item=>{

        const badgeClass =
        item.status==="OK"
        ?"badge badge-ok"
        :"badge badge-ng";

        tbody.innerHTML += `
        <tr>
            <td>${item.equipment||'-'}</td>
            <td>${item.asset||'-'}</td>
            <td>${item.location||'-'}</td>
            <td>${item.condition||'-'}</td>
            <td>${item.calibration||'-'}</td>
            <td>${item.date_in||'-'}</td>
            <td>${item.date_out||'-'}</td>
            <td>
            <span class="${badgeClass}">
            ${item.status||'-'}
            </span>
            </td>
        </tr>
        `;

    });

}

async function saveData(){

    const newData = {

        equipment:
        document.getElementById("fEquipment").value,

        asset:
        document.getElementById("fAsset").value,

        location:
        document.getElementById("fLocation").value,

        condition:
        document.getElementById("fCondition").value,

        calibration:
        document.getElementById("fCalibration").value,

        date_in:
        document.getElementById("fDateIn").value,

        date_out:
        document.getElementById("fDateOut").value,

        status:
        document.getElementById("fStatus").value

    };

    await fetch(API_URL,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify(newData)
    });

    alert("✅ Data berhasil ditambahkan");

    fetchData();

}

fetchData();

</script>

</body>
</html>
