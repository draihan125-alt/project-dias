
<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Improvement Dashboard</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      font-family: "Poppins", sans-serif;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(102, 126, 234, 0.25), transparent 35%),
        radial-gradient(circle at bottom right, rgba(118, 75, 162, 0.22), transparent 35%),
        #f4f7fb;
      color: #2d3436;
    }

    .page-wrapper {
      padding: 24px;
    }

    .hidden {
      display: none !important;
    }

    .topbar {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 26px 30px;
      border-radius: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 15px 35px rgba(102, 126, 234, 0.35);
      position: relative;
      overflow: hidden;
    }

    .topbar::before {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 50%;
      right: -70px;
      top: -80px;
    }

    .topbar::after {
      content: "";
      position: absolute;
      width: 140px;
      height: 140px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      left: 45%;
      bottom: -80px;
    }

    .topbar-text {
      position: relative;
      z-index: 1;
    }

    .topbar h2 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .topbar p {
      margin: 7px 0 0;
      font-size: 14px;
      opacity: 0.9;
    }

    .btn-add {
      position: relative;
      z-index: 1;
      padding: 12px 22px;
      background: #ffffff;
      border: none;
      border-radius: 12px;
      color: #5f50d8;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
      transition: 0.25s ease;
    }

    .btn-add:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.22);
      background: #f7f7ff;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin: 22px 0;
    }

    .summary-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
    }

    .summary-card .label {
      color: #7f8c8d;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .summary-card .value {
      font-size: 28px;
      font-weight: 700;
      color: #2d3436;
    }

    .summary-card.total {
      border-left: 5px solid #667eea;
    }

    .summary-card.ok {
      border-left: 5px solid #2ecc71;
    }

    .summary-card.ng {
      border-left: 5px solid #e74c3c;
    }

    .toolbar {
      background: white;
      padding: 18px;
      border-radius: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.07);
    }

    .search-box {
      position: relative;
      width: 340px;
    }

    .search-box input {
      width: 100%;
      padding: 13px 16px 13px 44px;
      border: 1px solid #e1e6ef;
      border-radius: 14px;
      outline: none;
      font-size: 14px;
      transition: 0.25s ease;
      background: #f8fafc;
    }

    .search-box input:focus {
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.12);
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #95a5a6;
    }

    .toolbar-info {
      color: #636e72;
      font-size: 14px;
    }

    .toolbar-info b {
      color: #667eea;
      font-size: 18px;
    }

    .table-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
      border: 1px solid #eef1f6;
    }

    .table-responsive {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    thead {
      background: linear-gradient(135deg, #f8f9ff, #eef2ff);
    }

    th {
      padding: 16px 15px;
      font-size: 12px;
      text-align: left;
      color: #636e72;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      border-bottom: 1px solid #e9edf5;
      white-space: nowrap;
    }

    td {
      padding: 15px;
      border-bottom: 1px solid #f0f2f5;
      font-size: 14px;
      color: #2d3436;
      vertical-align: middle;
    }

    tbody tr {
      transition: 0.2s ease;
    }

    tbody tr:hover {
      background: #f8fbff;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .equipment-text {
      font-weight: 600;
      color: #2d3436;
    }

    .asset-pill {
      display: inline-block;
      padding: 5px 10px;
      background: #eef2ff;
      color: #5f50d8;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .date-text {
      color: #636e72;
      font-size: 13px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 13px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      min-width: 52px;
    }

    .badge-ok {
      background: #dff7e8;
      color: #1e8449;
    }

    .badge-ng {
      background: #fde2e2;
      color: #c0392b;
    }

    .empty-state {
      text-align: center;
      padding: 45px 20px;
      color: #95a5a6;
      font-size: 14px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 99;
    }

    .modal-content {
      background: white;
      padding: 26px;
      border-radius: 22px;
      width: 460px;
      max-width: 100%;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
      animation: modalShow 0.25s ease;
    }

    @keyframes modalShow {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .modal-header h3 {
      margin: 0;
      font-size: 22px;
      color: #2d3436;
    }

    .btn-close {
      background: #f1f2f6;
      border: none;
      color: #636e72;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      transition: 0.2s ease;
    }

    .btn-close:hover {
      background: #e4e7ec;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 600;
      color: #636e72;
      margin-bottom: 6px;
    }

    .modal-content input,
    .modal-content select {
      width: 100%;
      padding: 12px;
      border: 1px solid #e1e6ef;
      border-radius: 12px;
      outline: none;
      background: #f8fafc;
      transition: 0.25s ease;
    }

    .modal-content input:focus,
    .modal-content select:focus {
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.12);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-save {
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      color: white;
      padding: 11px 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(46, 204, 113, 0.25);
      transition: 0.25s ease;
    }

    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(46, 204, 113, 0.32);
    }

    .btn-cancel {
      background: #edf0f5;
      color: #636e72;
      padding: 11px 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-cancel:hover {
      background: #e1e5eb;
    }

    @media (max-width: 768px) {
      .page-wrapper {
        padding: 16px;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 18px;
      }

      .topbar h2 {
        font-size: 23px;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .toolbar {
        flex-direction: column;
        align-items: stretch;
        gap: 14px;
      }

      .search-box {
        width: 100%;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="page-wrapper">
    <div class="topbar">
      <div class="topbar-text">
        <h2>📋 Improvement Dashboard</h2>
        <p>Monitoring data equipment, asset, calibration, dan status kondisi.</p>
      </div>

      <button class="btn-add" onclick="openModal()">+ Add Data</button>
    </div>

    <div class="summary-grid">
      <div class="summary-card total">
        <div class="label">Total Data</div>
        <div class="value" id="totalData">0</div>
      </div>

      <div class="summary-card ok">
        <div class="label">Status OK</div>
        <div class="value" id="totalOK">0</div>
      </div>

      <div class="summary-card ng">
        <div class="label">Status NG</div>
        <div class="value" id="totalNG">0</div>
      </div>
    </div>

    <div class="toolbar">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="searchInput"
          placeholder="Search equipment, asset, location..."
          onkeyup="renderTable()"
        />
      </div>

      <div class="toolbar-info">
        Menampilkan <b id="shownData">0</b> data
      </div>
    </div>

    <div class="table-card">
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Equipment</th>
              <th>Asset</th>
              <th>Location</th>
              <th>Condition</th>
              <th>Calibration</th>
              <th>Date In</th>
              <th>Date Out</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal hidden" id="modalForm">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Tambah Data</h3>
        <button class="btn-close" onclick="closeModal()">×</button>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Equipment</label>
          <input id="fEquipment" placeholder="Masukkan equipment" />
        </div>

        <div class="form-group">
          <label>Asset</label>
          <input id="fAsset" placeholder="Masukkan asset" />
        </div>

        <div class="form-group">
          <label>Location</label>
          <input id="fLocation" placeholder="Masukkan location" />
        </div>

        <div class="form-group">
          <label>Condition</label>
          <input id="fCondition" placeholder="Masukkan condition" />
        </div>

        <div class="form-group full">
          <label>Calibration</label>
          <input id="fCalibration" placeholder="Masukkan calibration" />
        </div>

        <div class="form-group">
          <label>Date In</label>
          <input id="fDateIn" type="date" />
        </div>

        <div class="form-group">
          <label>Date Out</label>
          <input id="fDateOut" type="date" />
        </div>

        <div class="form-group full">
          <label>Status</label>
          <select id="fStatus">
            <option value="OK">OK</option>
            <option value="NG">NG</option>
          </select>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveData()">Save</button>
      </div>
    </div>
  </div>

 <script>
    const API_URL = "https://project-dias.onrender.com/equipments";
    let data = [];

async function fetchData() {
  try {
    const res = await fetch(API_URL);
    const result = await res.json();

    data = result;
    renderTable();
    updateSummary();
  } catch (error) {
    console.error("Gagal mengambil data:", error);
    data = [];
    renderTable();
    updateSummary();
  }
}

    function openModal() {
      document.getElementById("modalForm").classList.remove("hidden");
    }

    function closeModal() {
      document.getElementById("modalForm").classList.add("hidden");
    }

    function clearForm() {
      document.getElementById("fEquipment").value = "";
      document.getElementById("fAsset").value = "";
      document.getElementById("fLocation").value = "";
      document.getElementById("fCondition").value = "";
      document.getElementById("fCalibration").value = "";
      document.getElementById("fDateIn").value = "";
      document.getElementById("fDateOut").value = "";
      document.getElementById("fStatus").value = "OK";
    }

    function updateSummary() {
      const total = data.length;

      const totalOK = data.filter(item =>
        item.status && item.status.toUpperCase() === "OK"
      ).length;

      const totalNG = data.filter(item =>
        item.status && item.status.toUpperCase() === "NG"
      ).length;

      document.getElementById("totalData").innerText = total;
      document.getElementById("totalOK").innerText = totalOK;
      document.getElementById("totalNG").innerText = totalNG;
    }

    function renderTable() {
      const tbody = document.getElementById("table-body");
      const keyword = document.getElementById("searchInput").value.toLowerCase();

      tbody.innerHTML = "";

      const filteredData = data.filter(item => {
        const equipment = item.equipment ? item.equipment.toLowerCase() : "";
        const asset = item.asset ? item.asset.toLowerCase() : "";
        const location = item.location ? item.location.toLowerCase() : "";
        const condition = item.condition ? item.condition.toLowerCase() : "";
        const calibration = item.calibration ? item.calibration.toLowerCase() : "";
        const status = item.status ? item.status.toLowerCase() : "";

        return (
          equipment.includes(keyword) ||
          asset.includes(keyword) ||
          location.includes(keyword) ||
          condition.includes(keyword) ||
          calibration.includes(keyword) ||
          status.includes(keyword)
        );
      });

      document.getElementById("shownData").innerText = filteredData.length;

      if (filteredData.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="8" class="empty-state">
              Tidak ada data yang ditemukan
            </td>
          </tr>
        `;
        return;
      }

      filteredData.forEach(item => {
        const status = item.status ? item.status.toUpperCase() : "-";

        const badgeClass =
          status === "OK"
            ? "badge badge-ok"
            : "badge badge-ng";

        const dateIn = item.date_in ? item.date_in.split("T")[0] : "-";
        const dateOut = item.date_out ? item.date_out.split("T")[0] : "-";

        const row = `
          <tr>
            <td><span class="equipment-text">${item.equipment || "-"}</span></td>
            <td><span class="asset-pill">${item.asset || "-"}</span></td>
            <td>${item.location || "-"}</td>
            <td>${item.condition || "-"}</td>
            <td>${item.calibration || "-"}</td>
            <td><span class="date-text">${dateIn}</span></td>
            <td><span class="date-text">${dateOut}</span></td>
            <td><span class="${badgeClass}">${status}</span></td>
          </tr>
        `;

        tbody.innerHTML += row;
      });
    }

    async function saveData() {
      const newData = {
        equipment: document.getElementById("fEquipment").value,
        asset: document.getElementById("fAsset").value,
        location: document.getElementById("fLocation").value,
        condition: document.getElementById("fCondition").value,
        calibration: document.getElementById("fCalibration").value,
        date_in: document.getElementById("fDateIn").value,
        date_out: document.getElementById("fDateOut").value,
        status: document.getElementById("fStatus").value
      };

      await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(newData)
      });

      alert("✅ Data berhasil disimpan");
      clearForm();
      closeModal();
      fetchData();
    }

    fetchData();
  </script>
</body>
</html>
